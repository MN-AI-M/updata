<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Core Forge - Alchemy Gallery & Post</title>
    <style>
    body, html { 
        background: #000; 
        color: #00ffff; 
        font-family: 'Courier New', monospace; 
        margin: 0; padding: 0; 
        height: 100%; 
        /* 錬成陣を背景に埋め込み（TEXTURE_DATA.pyと同じ画像を使う） */
        background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI0OCIgc3Ryb2tlPSIjMDBmZmZmIiBzdHJva2Utd2lkdGg9IjEiIGZpbGw9Im5vbmUiIHN0cm9rZS1vcGFjaXR5PSIwLjE5Ii8+PC9zdmc+');
        background-repeat: no-repeat;
        background-position: center;
        background-attachment: fixed;
    }

    .container { 
        max-width: 800px; 
        margin: 40px auto; 
        /* サイバーなネオンフレーム */
        border: 2px solid #00ffff; 
        border-radius: 12px;
        padding: 30px; 
        background: rgba(10, 10, 15, 0.9);
        box-shadow: 
            0 0 30px rgba(0, 255, 255, 0.3),
            inset 0 0 50px rgba(0, 255, 255, 0.1);
        backdrop-filter: blur(5px); /* 背景の錬成陣を少しボカす */
    }

    h1 { 
        text-align: center; 
        letter-spacing: 10px; 
        text-transform: uppercase; 
        color: #fff; 
        text-shadow: 0 0 15px #00ffff;
        border-bottom: 2px solid transparent;
        border-image: linear-gradient(to right, transparent, #00ffff, transparent) 1;
        padding-bottom: 15px;
    }
    
    .upload-section { 
        border: 2px dashed rgba(0,255,255,0.4); 
        padding: 30px; 
        text-align: center; 
        margin-bottom: 30px; 
        border-radius: 8px;
        background: rgba(0,255,255,0.02);
    }
    
    .input-group { margin: 25px 0; }
    
    label {
        color: rgba(0, 255, 255, 0.8);
        font-size: 12px;
        margin-bottom: 8px;
        display: block;
        letter-spacing: 2px;
    }

    input[type="password"], input[type="text"] { 
        background: #000; 
        border: 1px solid rgba(0, 255, 255, 0.3); 
        color: #00ffff; 
        padding: 12px; 
        width: 100%; 
        box-sizing: border-box; 
        border-radius: 4px;
        transition: 0.3s;
    }
    
    input[type="password"]:focus, input[type="text"]:focus {
        border-color: #00ffff;
        box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        outline: none;
    }
    
    button { 
        background: #00ffff; 
        color: #000; 
        border: none; 
        padding: 18px; 
        width: 100%; 
        font-weight: bold; 
        cursor: pointer; 
        transition: 0.3s; 
        font-size: 14px;
        letter-spacing: 3px;
        /* SF感のある角の切り取り（クリップ） */
        clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    }
    
    button:hover { 
        background: #fff; 
        box-shadow: 0 0 30px #fff; 
        color: #000;
    }
    
    #status-msg { 
        margin-top: 20px; 
        font-size: 12px; 
        color: #ff00ff; 
        text-shadow: 0 0 10px #ff00ff;
        text-align: center;
        min-height: 1em;
    }

    .gallery-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
        gap: 20px; 
        margin-top: 30px; 
        padding-top: 30px;
    }
</style>
</head>
<body>

<div class="container">
    <h1>POST DATA</h1>
    
    <div class="upload-section" id="drop-area">
        <p>錬成データを統合中...</p>
        <div id="preview-area"></div>
    </div>

    <div class="input-group">
        <label>作品名 / Piece Title</label>
        <input type="text" id="post-title" placeholder="Untitled Alchemy">
    </div>

    <div class="input-group">
        <label>管理パスワード / Secret Key (Hash-based)</label>
        <input type="password" id="post-pass" placeholder="Enter password to protect your data">
    </div>

    <button onclick="executeIntegration()">データを統合して世界へ公開する</button>
    
    <div id="status-msg"></div>

    <hr style="border: 0.5px solid #222; margin: 40px 0;">
    <h1>GLOBAL GALLERY</h1>
    <div id="gallery-container" class="gallery-grid">
        </div>
</div>

<script>
    // 1. パスワードのハッシュ化（セキュリティの鉄則）
    async function hashPassword(password) {
        const msgUint8 = new TextEncoder().encode(password);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // 2. データの統合と送信（挙動予測）
    async function executeIntegration() {
        const title = document.getElementById('post-title').value;
        const pass = document.getElementById('post-pass').value;
        const msg = document.getElementById('status-msg');

        if(!pass) { msg.innerText = "ERROR: Password required."; return; }

        msg.innerText = "TRANSMUTING DATA...";
        
        // パスワードをハッシュ化（コードを見られても大丈夫な理由）
        const pHash = await hashPassword(pass);
        
        // ここで「データ用Hugging Face」のAPIを叩く
        // 実際には fetch('https://データ用HF-API/save', { ... }) となる
        console.log("統合完了:", { title, pHash });
        msg.innerText = "SUCCESS: Data has been synchronized with the gallery.";
    }
</script>

</body>
</html>
