<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Core Forge - Alchemy Gallery & Post</title>
    <style>
        body { background: #000; color: #00ffff; font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; border: 1px solid #00ffff; padding: 20px; box-shadow: 0 0 15px #00ffff; }
        h1 { text-align: center; letter-spacing: 5px; text-transform: uppercase; }
        
        .upload-section { border: 2px dashed #444; padding: 30px; text-align: center; margin-bottom: 20px; }
        .input-group { margin: 15px 0; }
        input[type="password"], input[type="text"] { 
            background: #111; border: 1px solid #00ffff; color: #00ffff; padding: 10px; width: 100%; box-sizing: border-box; 
        }
        
        button { 
            background: #00ffff; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; 
            cursor: pointer; transition: 0.3s; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
        }
        button:hover { background: #fff; box-shadow: 0 0 20px #fff; }
        
        #status-msg { margin-top: 20px; font-size: 12px; color: #ff00ff; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <h1>POST DATA</h1>
    
    <div class="upload-section" id="drop-area">
        <p>錬成データを統合中...</p>
        <div id="preview-area"></div>
    </div>

    <div class="input-group">
        <label>作品名 / Piece Title</label>
        <input type="text" id="post-title" placeholder="Untitled Alchemy">
    </div>

    <div class="input-group">
        <label>管理パスワード / Secret Key (Hash-based)</label>
        <input type="password" id="post-pass" placeholder="Enter password to protect your data">
    </div>

    <button onclick="executeIntegration()">データを統合して世界へ公開する</button>
    
    <div id="status-msg"></div>

    <hr style="border: 0.5px solid #222; margin: 40px 0;">
    <h1>GLOBAL GALLERY</h1>
    <div id="gallery-container" class="gallery-grid">
        </div>
</div>

<script>
    // 1. パスワードのハッシュ化（セキュリティの鉄則）
    async function hashPassword(password) {
        const msgUint8 = new TextEncoder().encode(password);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // 2. データの統合と送信（挙動予測）
    async function executeIntegration() {
        const title = document.getElementById('post-title').value;
        const pass = document.getElementById('post-pass').value;
        const msg = document.getElementById('status-msg');

        if(!pass) { msg.innerText = "ERROR: Password required."; return; }

        msg.innerText = "TRANSMUTING DATA...";
        
        // パスワードをハッシュ化（コードを見られても大丈夫な理由）
        const pHash = await hashPassword(pass);
        
        // ここで「データ用Hugging Face」のAPIを叩く
        // 実際には fetch('https://データ用HF-API/save', { ... }) となる
        console.log("統合完了:", { title, pHash });
        msg.innerText = "SUCCESS: Data has been synchronized with the gallery.";
    }
</script>

</body>
</html>
